name: Publish docs via GitHub Pages

# Only run on new tags
on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths:
      - 'README.md'
      - 'CHANGES.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'titiler/**.py'
      - .github/workflows/deploy_mkdocs.yml
  workflow_dispatch:

jobs:
  build:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.*" 
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group docs

      - name: Set module version
        id: module
        run: |
          echo version=$(uv run python -c'import titiler.pgstac; print(titiler.pgstac.__version__)') >> $GITHUB_OUTPUT

      - name: Generate OpenAPI schema          
        run: |
          uv run python -c'from titiler.pgstac.main import app; import json; print(json.dumps(app.openapi(), indent=4))' > docs/src/openapi.json

      - name: Configure Git user
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Fetch gh-pages repository
        run: |
          git fetch origin gh-pages --depth=1

      - name: Deploy documentation (main → latest alias)
        if: github.ref_type == 'branch'
        run: uv run mike deploy latest --update-aliases --push --config-file docs/mkdocs.yml

      - name: Deploy documentation (tag → version only)
        if: github.ref_type == 'tag'
        run: uv run mike deploy ${{ steps.module.outputs.version }} --push --config-file docs/mkdocs.yml
